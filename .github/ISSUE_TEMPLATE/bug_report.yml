name: Bug Report
description: Create a report to help us improve Synqit
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug! Please fill out the form below."
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Synqit version
      description: Output of `synqit version`
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS version and Python version
